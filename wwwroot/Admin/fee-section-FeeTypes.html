            box-shadow: 1px 1px 5px rgba(0,0,0,0.7);

    <nav class="navbar navbar-light border-bottom">
        <div class="container-fluid">
            <a href="../dashboard.html"
               class="navbar-brand fw-bold d-flex align-items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                     fill="#000000" viewBox="0 0 24 24">
                    <!--Boxicons v3.0.8 https://boxicons.com | License  https://docs.boxicons.com/free-->

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-2 col-lg-2 sidebar p-0">
                <ul class="nav flex-column mt-3">

                    <li class="nav-item">
                        <a href="index.html" class="nav-link">
                            <i class='bx bxs-dashboard me-2'></i>
                            Dashboard
                        </a>
                    </li>

                    <li class="nav-item">
                        <a href="class-section.html" class="nav-link">
                            <i class='bx bxs-group me-2'></i>
                            Class section
                        </a>
                    </li>

                    <li class="nav-item">
                        <a href="subject-section.html" class="nav-link">
                            <i class='bx bxs-school me-2'></i>

                        </a>
                    </li>

                    <li class="nav-item">
                        <a href="#feeMenu" class="nav-link" data-bs-toggle="collapse" role="button" aria-expanded="false">

                        </a>
                        <div id="feeMenu">
                            <ul class="nav flex-column ms-5">
                                <li class="nav-item">
                                    <a href="fee-section-FeeTypes.html" class="nav-link active-menu">
                                        <i class='bx bx-purchase-tag'></i>
                                        Fee Types
                                    </a>
                                </li>
                                <li class="nav-item">
                                    <a href="fee-section-ClassFeeMap.html" class="nav-link">

                                    </a>
                                </li>

                            </ul>
                        </div>

                </ul>

            <div class="col-md-9 col-lg-10 p-4">
                <div class="d-flex justify-content-between align-items-center">
                    <h2 class="mb-2">
                        Fee Types Section
                    </h2>
                </div>

                <div class="row">
                    <div class="col-md-5 mt-lg-5">
                        <div class="card p-3">
                            <h5 class="text-center mb-4 p-2" style=" box-shadow: 2px 2px 5px rgba(0,0,0,0.5); border-radius:5px">Add New Fee Type</h5>
                            <div class="d-flex gap-3">
                                <label for="feeTypeName" class="mb-1">Enter the Fee Type Name: </label>
                                <input type="text" id="feeTypeName" placeholder="Eg. Tuition Fee" style="border-radius:5px; height: 30px; padding-left : 10px; width : 100%" />
                            </div>
                            <button class="btn btn-primary mt-3 w-50 m-auto btn-sm"
                                    onclick="AddFeeType()">
                                Add
                            </button>

                            <input type="hidden" id="hiddenField"/>

                        </div>
                    </div>
                    <div class="col-md-7 mt-lg-5">
                        <h1 class="ftheading text-center">Available Fee Types</h1>
                        <table class="table table-hover text-center table-bordered">
                            <tr>
                                <th>Sr.No</th>
                                <th>Fee Type</th>
                                <th>Actions</th>
                            </tr>
                            <tbody id="feeTypeTableBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
