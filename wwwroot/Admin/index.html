<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-light bg-light border-bottom">
        <div class="container-fluid">

            <a href="../dashboard.html"
               class="navbar-brand fw-bold">
                🎓 Student ERP
            </a>

            <span>
                Welcome, <strong>Admin</strong>
            </span>

        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">

            <!-- Sidebar -->
            <div class="col-md-3 col-lg-2 bg-light vh-100 border-end">

                <h4 class="mt-4 mb-4 text-center">
                    Admin
                </h4>

                <div class="list-group">

                    <a href="index.html"
                       class="list-group-item list-group-item-action active">
                        Dashboard
                    </a>

                    <a href="class-section.html"
                       class="list-group-item list-group-item-action">
                        Class Section
                    </a>

                    <a href="subject-section.html"
                       class="list-group-item list-group-item-action">
                        Subject Section
                    </a>

                </div>

                <div class="mt-4">
                    <a href="../dashboard.html"
                       class="btn btn-outline-secondary w-100">
                        Back to Dashboard
                    </a>
                </div>

            </div>

            <!-- Main Content -->
            <div class="col-md-9 col-lg-10 p-4">

                <h2 class="mb-4">
                    Admin Dashboard
                </h2>

                <!-- Statistics -->
                <div class="row g-3 mb-4">

                    <div class="col-md-3">
                        <div class="card text-center">
                            <div class="card-body">
                                <h3>24</h3>
                                <p class="mb-0">Class Sections</p>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card text-center">
                            <div class="card-body">
                                <h3>68</h3>
                                <p class="mb-0">Subjects</p>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card text-center">
                            <div class="card-body">
                                <h3>142</h3>
                                <p class="mb-0">Teachers</p>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card text-center">
                            <div class="card-body">
                                <h3>1840</h3>
                                <p class="mb-0">Students</p>
                            </div>
                        </div>
                    </div>

                </div>

                <!-- Quick Actions -->
                <div class="card">

                    <div class="card-header">
                        Quick Actions
                    </div>

                    <div class="card-body">

                        <a href="class-section.html"
                           class="btn btn-primary me-2">
                            Manage Classes
                        </a>

                        <a href="subject-section.html"
                           class="btn btn-success">
                            Manage Subjects
                        </a>

                    </div>

                </div>

            </div>

        </div>
    </div>

</body>
</html>
