<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css'
          rel='stylesheet'>

    <style>
        label {
            min-width: 180px;
        }

        body {
            background-color: #f8f9fa;
        }

        /* Sidebar */
        .sidebar {
            background: white;
            min-height: 100vh;
            border-right: 1px solid #dee2e6;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
        }

        .nav-link {
            color: #495057;
            padding: 12px 20px;
            margin: 4px 10px;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: 500;
        }

            .nav-link:hover {
                background-color: #e9ecef;
                color: #212529;
                transform: translateX(5px);
            }

        .active-menu {
            background-color: #0d6efd !important;
            color: white !important;
        }

            .active-menu i {
                color: white !important;
            }
    </style>

</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-light bg-light border-bottom">
        <div class="container-fluid">

            <a href="../dashboard.html"
               class="navbar-brand fw-bold">
                🎓 Student ERP
            </a>

            <span>
                Welcome, <strong>Admin</strong>
            </span>

        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">

            <!-- Sidebar -->
            <div class="col-md-2 col-lg-2 sidebar p-0">
                <ul class="nav flex-column mt-3">

                    <li class="nav-item">
                        <a href="index.html" class="nav-link active-menu ">
                            <i class='bx bxs-dashboard me-2'></i>
                            Dashboard
                        </a>
                    </li>

                    <li class="nav-item">
                        <a href="class-section.html" class="nav-link">
                            <i class='bx bxs-group me-2'></i>
                            Class section
                        </a>
                    </li>

                    <li class="nav-item">
                        <a href="subject-section.html" class="nav-link">
                            <i class='bx bxs-school me-2'></i>
                            Subject Section
                        </a>
                    </li>

                 

                </ul>

            </div>

            <!-- Main Content -->
            <div class="col-md-9 col-lg-10 p-4">

                <h2 class="mb-4">
                    Admin Dashboard
                </h2>

                <!-- Statistics -->
                <div class="row g-3 mb-4">

                    <div class="col-md-3">
                        <div class="card text-center">
                            <div class="card-body">
                                <h3>24</h3>
                                <p class="mb-0">Class Sections</p>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card text-center">
                            <div class="card-body">
                                <h3>68</h3>
                                <p class="mb-0">Subjects</p>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card text-center">
                            <div class="card-body">
                                <h3>142</h3>
                                <p class="mb-0">Teachers</p>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card text-center">
                            <div class="card-body">
                                <h3>1840</h3>
                                <p class="mb-0">Students</p>
                            </div>
                        </div>
                    </div>

                </div>

                <!-- Quick Actions -->
                <div class="card">

                    <div class="card-header">
                        Quick Actions
                    </div>

                    <div class="card-body">

                        <a href="class-section.html"
                           class="btn btn-primary me-2">
                            Manage Classes
                        </a>

                        <a href="subject-section.html"
                           class="btn btn-success">
                            Manage Subjects
                        </a>

                    </div>

                </div>

            </div>

        </div>
    </div>

</body>
</html>
