<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Section</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/izitoast/1.4.0/css/iziToast.min.css" integrity="sha512-O03ntXoVqaGUTAeAmvQ2YSzkCvclZEcPQu1eqloPaHfJ5RuNGiS4l+3duaidD801P50J28EHyonCV06CUlTSag==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

    <div class="container-fluid">
        <div class="row">

            <!-- Sidebar -->
            <div class="col-md-3 col-lg-2 bg-light vh-100 border-end">

                <h4 class="mt-4 mb-4 text-center">
                    Student ERP
                </h4>

                <div class="list-group">

                    <a href="index.html"
                       class="list-group-item list-group-item-action active">
                        Dashboard
                    </a>

                    <a href="#"
                       class="list-group-item list-group-item-action">
                        Class Section
                    </a>

                    <a href="subject-section.html"
                       class="list-group-item list-group-item-action">
                        Subject Section
                    </a>

                </div>

            </div>

            <!-- Content -->
            <div class="col-md-9 col-lg-10 p-4">

                <h2>Class Section</h2>

                <div class="row mb-3">

                    <div class="col-md-6">
                        <input type="text"
                               class="form-control"
                               placeholder="Search..."
                               id="searchInput"
                               onkeyup="filterTable()">
                    </div>

                    <div class="col-md-6 text-end">

                        <button class="btn btn-success"
                                data-bs-toggle="modal"
                                data-bs-target="#classModal">
                            Add Class Section
                        </button>

                    </div>

                </div>

                <table class="table table-bordered table-striped">

                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Class Name</th>
                            <th>Section</th>
                            <th>Grade</th>
                            <th>Capacity</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>

                    <tbody id="tableBody"></tbody>

                </table>

            </div>

        </div>
    </div>

    <!-- Modal -->

    <div class="modal fade"
         id="classModal"
         tabindex="-1">

        <div class="modal-dialog">

            <div class="modal-content">

                <div class="modal-header">

                    <h5 class="modal-title">
                        Add Class Section
                    </h5>

                    <button type="button"
                            class="btn-close"
                            data-bs-dismiss="modal">
                    </button>

                </div>

                <div class="modal-body">

                    <div class="mb-3">
                        <label>Class</label>
                        <select class="form-select"
                                id="classname">

                            <option value="1">Grade 1</option>
                            <option value="2">Grade 2</option>
                            <option value="3">Grade 3</option>
                            <option value="4">Grade 4</option>
                            <option value="5">Grade 5</option>
                            <option value="6">Grade 6</option>
                            <option value="7">Grade 7</option>
                            <option value="8">Grade 8</option>
                            <option value="9">Grade 9</option>
                            <option value="10">Grade 10</option>
                            <option value="11">Grade 11</option>
                            <option value="12">Grade 12</option>

                        </select>
                    </div>

                    <div class="mb-3">
                        <label>Section</label>
                        <input type="text"
                               class="form-control"
                               id="sectionName">
                    </div>

                    <div class="mb-3">
                        <label>Capacity</label>
                        <input type="number"
                               class="form-control"
                               id="capacity">
                    </div>

                    <div class="mb-3">
                        <label>Status</label>
                        <select class="form-select" id="status">
                            <option value="active">Active</option>
                            <option value="inactive">Inactive</option>
                        </select>
                    </div>

                </div>

                <div class="modal-footer">

                    <button class="btn btn-secondary"
                            data-bs-dismiss="modal">
                        Cancel
                    </button>

                    <button class="btn btn-primary"
                            onclick="saveClass()">
                        Save
                    </button>

                </div>

            </div>

        </div>

    </div>

    <script>

        let data = [
            {
                id: 1,
                className: 'Grade 10',
                section: 'A',
                grade: 10,
                capacity: 40,
                status: 'Active'
            }
        ];

        function renderTable(rows) {

            document.getElementById('tableBody').innerHTML =
                rows.map((r, index) => `

                    <tr>
                        <td>${index + 1}</td>
                        <td>${r.className}</td>
                        <td>${r.section}</td>
                        <td>${r.grade}</td>
                        <td>${r.capacity}</td>
                        <td>
                            <span class="badge bg-success">
                                ${r.status}
                            </span>
                        </td>
                        <td>
                            <button class="btn btn-warning btn-sm">
                                Edit
                            </button>

                            <button class="btn btn-danger btn-sm">
                                Delete
                            </button>
                        </td>
                    </tr>

                    `).join('');
        }

        renderTable(data);





        async function saveClass() {
            var classx = document.getElementById("classname").value;
            var section = document.getElementById("sectionName").value.trim().toUpperCase();
            var capacity = document.getElementById("capacity").value;
            var status = document.getElementById("status").value.trim().toUpperCase();

            console.log(classx, section, capacity, status);


            try {
                const response = await fetch("https://localhost:7098/api/admin/add/class", {
                    method: "POST",
                    headers: {
                        "Content-type": "application/json"
                    },
                    body: JSON.stringify({
                        "ClassN": classx,
                        "Section": section,
                        "Capacity": capacity,
                        "Status": status
                    })
                });


                const res = await response.json();

                if (res.success) {
                    //successfull
                    iziToast.success({
                        title: 'OK',
                        message: 'Successfully inserted Class!',
                    });
                }
                else {
                    // unsuccessfull
                    iziToast.error({
                        title: 'Error',
                        message: 'Error inserting Class',
                    });

                }

            }
            catch (err) {
                console.log(err);
                // Error
                iziToast.error({
                    title: 'Error',
                    message: 'Error inserting Class',
                });
            }

            // IMP : Closing the modal
            var modalItem = document.getElementById("classModal");

            var modelInstance = bootstrap.Modal.getInstance(modalItem);

            if (modelInstance) modelInstance.hide();


        }


    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/izitoast/1.4.0/js/iziToast.min.js" integrity="sha512-Zq9o+E00xhhR/7vJ49mxFNJ0KQw1E1TMWkPTxrWcnpfEFDEXgUiwJHIKit93EW/XxE31HSI5GEOW06G6BF1AtA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

</body>
</html>
