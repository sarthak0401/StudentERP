<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Section</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/izitoast/1.4.0/css/iziToast.min.css" integrity="sha512-O03ntXoVqaGUTAeAmvQ2YSzkCvclZEcPQu1eqloPaHfJ5RuNGiS4l+3duaidD801P50J28EHyonCV06CUlTSag==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        #classTable tr:hover{
            cursor : pointer;
        }
    </style>
</head>

<body>
    <body>

        <!-- Navbar -->
        <nav class="navbar navbar-light bg-light border-bottom">
            <div class="container-fluid">

                <a href="../dashboard.html"
                   class="navbar-brand fw-bold">
                    🎓 Student ERP
                </a>

                <span>
                    Welcome, <strong>Admin</strong>
                </span>

            </div>
        </nav>

        <div class="container-fluid">
            <div class="row">

                <!-- Sidebar -->
                <div class="col-md-3 col-lg-2 bg-light vh-100 border-end">

                    <h4 class="mt-4 mb-4 text-center">
                        Admin
                    </h4>

                    <div class="list-group">

                        <a href="index.html"
                           class="list-group-item list-group-item-action">
                            Dashboard
                        </a>

                        <a href="class-section.html"
                           class="list-group-item list-group-item-action active">
                            Class Section
                        </a>

                        <a href="subject-section.html"
                           class="list-group-item list-group-item-action">
                            Subject Section
                        </a>

                    </div>

                    <div class="mt-4">
                        <a href="../dashboard.html"
                           class="btn btn-outline-secondary w-100">
                            Back to Dashboard
                        </a>
                    </div>

                </div>

                <!-- Content -->
                <div class="col-md-9 col-lg-10 p-4">

                    <h2 class="mb-4">
                        Class Section
                    </h2>

                    <div class="row mb-3">

                        <div class="col-md-6">
                            <input type="text"
                                   class="form-control"
                                   placeholder="Search..."
                                   id="searchInput"
                                   onkeyup="filterTable()">
                        </div>

                        <div class="col-md-6 text-end">

                            <button class="btn btn-success"
                                    data-bs-toggle="modal"
                                    data-bs-target="#classModal">
                                Add Class Section
                            </button>

                        </div>

                    </div>

                    <table class="table table-bordered table-striped text-center" id="classTable">

                        <thead>
                            <tr>
                                <th>Sr.No </th>
                                <th>Class Name</th>
                                <th>Section</th>
                                <th>Capacity</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>

                        <tbody id="tableBody"></tbody>

                    </table>

                    <input type="hidden" id="classIdHiddenField" />

                    <div class="text-center" id="classSubjectText">
                        <h4>Select the class to add subjects</h4>
                    </div>

                    <div class="d-flex flex-column justify-content-center visually-hidden" id="subject-btn-grp">
                        <h3 class="text-center">Select Subjects to add</h3>
                        <table class="table table-bordered table-striped text-center">

                            <thead>
                                <tr>
                                    <th>Select</th>
                                    <th>Sr.No </th>
                                    <th>Subject Name</th>
                                    <th>Subject Code</th>
                                    <th>Credits</th>
                                </tr>
                            </thead>

                            <tbody id="subjectTableBody"></tbody>

                        </table>

                        <button class="btn btn-outline-success" onclick="addSubjToClass()">Add subjects to class</button>
                    </div>

                </div>

            </div>
        </div>

        <!-- Modal -->

        <div class="modal fade"
             id="classModal"
             tabindex="-1">

            <div class="modal-dialog">

                <div class="modal-content">

                    <div class="modal-header">

                        <h5 class="modal-title">
                            Add Class Section
                        </h5>

                        <button type="button"
                                class="btn-close"
                                data-bs-dismiss="modal">
                        </button>

                    </div>

                    <div class="modal-body">

                        <div class="mb-3">
                            <label>Class</label>
                            <select class="form-select"
                                    id="classname">

                                <option value="1">Grade 1</option>
                                <option value="2">Grade 2</option>
                                <option value="3">Grade 3</option>
                                <option value="4">Grade 4</option>
                                <option value="5">Grade 5</option>
                                <option value="6">Grade 6</option>
                                <option value="7">Grade 7</option>
                                <option value="8">Grade 8</option>
                                <option value="9">Grade 9</option>
                                <option value="10">Grade 10</option>
                                <option value="11">Grade 11</option>
                                <option value="12">Grade 12</option>

                            </select>
                        </div>

                        <div class="mb-3">
                            <label>Section</label>
                            <input type="text"
                                   class="form-control"
                                   id="sectionName">
                        </div>

                        <div class="mb-3">
                            <label>Capacity</label>
                            <input type="number"
                                   class="form-control"
                                   id="capacity">
                        </div>

                        <div class="mb-3">
                            <label>Status</label>
                            <select class="form-select" id="status">
                                <option value="active">Active</option>
                                <option value="inactive">Inactive</option>
                            </select>
                        </div>

                    </div>

                    <div class="modal-footer">

                        <button class="btn btn-secondary"
                                data-bs-dismiss="modal">
                            Cancel
                        </button>

                        <button class="btn btn-primary"
                                onclick="saveClass()">
                            Save
                        </button>

                    </div>

                </div>

            </div>

        </div>

        <script>

            async function addSubjToClass() {

                const cid = document.getElementById("classIdHiddenField").value;
                console.log("Class Id", cid);


                const selectedSubjectIds = [];

                const selectedOptions = document.querySelectorAll('input[name="subj"]:checked');


                selectedOptions.forEach(item => {
                    selectedSubjectIds.push(parseInt(item.value));
                });

                // Now this array have the values, now we will make a post request

                try {
                    const response = await fetch("https://localhost:7098/api/admin/add/subjectClass", {
                        method: "POST",
                        headers: {
                            "Content-type": "application/json"
                        },
                        body: JSON.stringify({
                            "classId": parseInt(cid),
                            "subjectIds": selectedSubjectIds
                        })
                    });

                    const res = response.json();

                    if (res.success) {
                        iziToast.success({
                            title: 'OK',
                            message: 'Successfully added the subject to the Class!',
                        });
                    }
                }
                catch (err) {
                    console.log(err);
                }
            }

            async function loadAllSubjects() {

                try {

                    const response = await fetch(
                        "https://localhost:7098/api/admin/get/subjects",
                        {
                            method: "GET",
                            headers: {
                                "Content-Type": "application/json"
                            }
                        });

                    const res = await response.json();


                    const tableBody = document.getElementById("subjectTableBody");

                    tableBody.innerHTML = "";

                    let index = 1;

                    res.forEach(item => {

                        tableBody.innerHTML += `
                            <tr>
                                <td><input type="checkbox" name="subj" value="${item.sid}"></td>
                                <td>${index++}</td>
                                <td>${item.sname}</td>
                                <td>${item.scode}</td>
                                <td>${item.scredits}</td>


                            </tr>
                                `;
                    });

                }
                catch (err) {

                    console.log(err);

                    // iziToast.error({
                    //     title: 'Error',
                    //     message: 'Unable to load subjects'
                    // });

                }
            }

            loadAllSubjects();

            async function deleteClass(id) {
                try {
                    const response = await fetch(`https://localhost:7098/api/admin/del/class/${id}`, {
                        method: "DELETE",
                        headers: {
                            "Content-type": "application/json"
                        }
                    });
                    const res = await response.json();
                    if (res.success) {
                        iziToast.success({
                            title: 'OK',
                            message: 'Successfully deleted Class!',
                        });

                        loadAllClasses();
                    }
                    else {
                        iziToast.error({
                            title: 'Error',
                            message: 'Error deleting Class',
                        });
                    }
                }
                catch (err) {
                    console.log(err);
                    iziToast.error({
                        title: 'Error',
                        message: 'Error deleting Class',
                    });
                }
            }

            async function loadAllClasses() {
                var tableBody = document.getElementById("tableBody");
                try {
                    const response = await fetch("https://localhost:7098/api/admin/get/classes", {
                        method: "GET",
                        headers: {
                            "Content-type": "application/json"
                        }
                    });

                    const res = await response.json();
                    tableBody.innerHTML = "";

                    let index = 1;
                    res.forEach(item => {
                        console.log(item);
                        tableBody.innerHTML += `
                                <tr onClick="classSubSelect('${index}','${item.cid}', '${item.cname}', '${item.section}', '${item.capacity}', '${item.status}')">
                                    <td> ${index++}</td>
                                    <td> ${item.cname}</td>
                                    <td> ${item.section}</td>
                                    <td> ${item.capacity}</td>
                                    <td> ${item.status}</td>
                                    <td>
                                        <button class="btn btn-warning btn-sm"> Edit</button>
                                        <button class="btn btn-danger btn-sm" onClick="deleteClass(${item.cid})"> Delete</button>
                                    </td>
                                </tr>
                            `;
                    })
                }
                catch (err) {
                    console.log(err);
                }
            }

            loadAllClasses();



            // Function to display only selected class
            function classSubSelect(index, cid, cname, section, capacity, status) {
                console.log(index, cid, cname, section, capacity, status);
                var tableBody = document.getElementById("tableBody");
                tableBody.innerHTML = "";

                tableBody.innerHTML = `
                        <tr>
                            <td> ${index}</td>
                            <td> ${cname}</td>
                            <td> ${section}</td>
                            <td> ${capacity}</td>
                            <td> ${status}</td>
                            <td>
                                <button class="btn btn-warning btn-sm"> Edit</button>
                                <button class="btn btn-danger btn-sm" onClick="deleteClass(${cid})"> Delete</button>
                            </td>
                     </tr>

                    `;

                document.getElementById("subject-btn-grp").classList.remove('visually-hidden');
                document.getElementById("classSubjectText").classList.add('visually-hidden');


                document.getElementById("classIdHiddenField").value = cid;
            }


            async function saveClass() {
                var classx = document.getElementById("classname").value;
                var section = document.getElementById("sectionName").value.trim().toUpperCase();
                var capacity = document.getElementById("capacity").value;
                var status = document.getElementById("status").value.trim().toUpperCase();

                console.log(classx, section, capacity, status);


                try {
                    const response = await fetch("https://localhost:7098/api/admin/add/class", {
                        method: "POST",
                        headers: {
                            "Content-type": "application/json"
                        },
                        body: JSON.stringify({
                            "ClassN": classx,
                            "Section": section,
                            "Capacity": capacity,
                            "Status": status
                        })
                    });


                    const res = await response.json();

                    if (res.success) {
                        //successfull
                        iziToast.success({
                            title: 'OK',
                            message: 'Successfully inserted Class!',
                        });
                        loadAllClasses();
                    }
                    else {
                        // unsuccessfull
                        iziToast.error({
                            title: 'Error',
                            message: 'Error inserting Class',
                        });

                    }

                }
                catch (err) {
                    console.log(err);
                    // Error
                    iziToast.error({
                        title: 'Error',
                        message: 'Error inserting Class',
                    });
                }

                // IMP : Closing the modal
                var modalItem = document.getElementById("classModal");

                var modelInstance = bootstrap.Modal.getInstance(modalItem);

                if (modelInstance) modelInstance.hide();


            }


        </script>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/izitoast/1.4.0/js/iziToast.min.js" integrity="sha512-Zq9o+E00xhhR/7vJ49mxFNJ0KQw1E1TMWkPTxrWcnpfEFDEXgUiwJHIKit93EW/XxE31HSI5GEOW06G6BF1AtA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    </body>
</html>
