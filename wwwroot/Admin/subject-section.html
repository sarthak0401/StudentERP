<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subject Section</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/izitoast/1.4.0/css/iziToast.min.css" />
</head>

<body>

    <div class="container-fluid">
        <div class="row">

            <!-- Sidebar -->
            <div class="col-md-3 col-lg-2 bg-light vh-100 border-end">

                <h4 class="mt-4 mb-4 text-center">
                    Student ERP
                </h4>

                <div class="list-group">

                    <a href="index.html"
                       class="list-group-item list-group-item-action">
                        Dashboard
                    </a>

                    <a href="class-section.html"
                       class="list-group-item list-group-item-action">
                        Class Section
                    </a>

                    <a href="#"
                       class="list-group-item list-group-item-action active">
                        Subject Section
                    </a>

                </div>

            </div>

            <!-- Main Content -->
            <div class="col-md-9 col-lg-10 p-4">

                <h2>Subject Section</h2>

                <div class="row mb-3">

                    <div class="col-md-6">
                        <input type="text"
                               class="form-control"
                               placeholder="Search Subject..."
                               id="searchInput"
                               onkeyup="filterTable()">
                    </div>

                    <div class="col-md-6 text-end">

                        <button class="btn btn-success"
                                data-bs-toggle="modal"
                                data-bs-target="#subjectModal">
                            Add Subject
                        </button>

                    </div>

                </div>

                <table class="table table-bordered table-striped text-center">

                    <thead>
                        <tr>
                            <th>Sr.No</th>
                            <th>Subject Name</th>
                            <th>Subject Code</th>
                            <th>Credits</th>
                            <th>Actions</th>
                        </tr>
                    </thead>

                    <tbody id="tableBody">
                    </tbody>

                </table>

            </div>

        </div>
    </div>

    <!-- Subject Modal -->

    <div class="modal fade"
         id="subjectModal"
         tabindex="-1">

        <div class="modal-dialog">

            <div class="modal-content">

                <div class="modal-header">

                    <h5 class="modal-title">
                        Add Subject
                    </h5>

                    <button type="button"
                            class="btn-close"
                            data-bs-dismiss="modal">
                    </button>

                </div>

                <div class="modal-body">

                    <div class="mb-3">
                        <label>Subject Name</label>
                        <input type="text"
                               class="form-control"
                               id="subjectName">
                    </div>

                    <div class="mb-3">
                        <label>Subject Code</label>
                        <input type="text"
                               class="form-control"
                               id="subjectCode">
                    </div>

                    <div class="mb-3">
                        <label>Credits</label>
                        <input type="number"
                               class="form-control"
                               id="credits">
                    </div>

                   

                </div>

                <div class="modal-footer">

                    <button class="btn btn-secondary"
                            data-bs-dismiss="modal">
                        Cancel
                    </button>

                    <button class="btn btn-primary"
                            onclick="saveSubject()">
                        Save
                    </button>

                </div>

            </div>

        </div>

    </div>

    <script>

        let allSubjects = [];

        async function loadAllSubjects() {

            try {

                const response = await fetch(
                    "https://localhost:7098/api/admin/get/subjects",
                    {
                        method: "GET",
                        headers: {
                            "Content-Type": "application/json"
                        }
                    });

                const res = await response.json();


                const tableBody = document.getElementById("tableBody");

                tableBody.innerHTML = "";

                let index = 1;

                res.forEach(item => {

                    tableBody.innerHTML += `
            <tr>
                <td>${index++}</td>
                <td>${item.sname}</td>
                <td>${item.scode}</td>
                <td>${item.scredits}</td>

                <td>
                    <button class="btn btn-warning btn-sm">
                        Edit
                    </button>

                    <button class="btn btn-danger btn-sm"
                            onclick="deleteSubject(${item.subjectId})">
                        Delete
                    </button>
                </td>
            </tr>
        `;
                });

            }
            catch (err) {

                console.log(err);

                // iziToast.error({
                //     title: 'Error',
                //     message: 'Unable to load subjects'
                // });

            }
        }

        function filterTable() {

            const searchText =
                document.getElementById("searchInput")
                    .value
                    .toLowerCase();

            const filtered = allSubjects.filter(x =>
                x.subjectName.toLowerCase().includes(searchText) ||
                x.subjectCode.toLowerCase().includes(searchText)
            );

            renderTable(filtered);
        }

        async function saveSubject() {

            const subjectName =
                document.getElementById("subjectName").value;

            const subjectCode =
                document.getElementById("subjectCode").value;

            const credits =
                document.getElementById("credits").value;


            try {

                const response = await fetch(
                    "https://localhost:7098/api/admin/add/subject",
                    {
                        method: "POST",

                        headers: {
                            "Content-Type": "application/json"
                        },

                        body: JSON.stringify({
                            "subjectname": subjectName,
                            "subjectcode": subjectCode,
                            "subjectcredits": credits
                        })
                    });

                const res = await response.json();

                if (res.success) {

                    iziToast.success({
                        title: 'Success',
                        message: 'Subject added successfully'
                    });

                    loadAllSubjects();

                    const modalElement =
                        document.getElementById("subjectModal");

                    const modal =
                        bootstrap.Modal.getInstance(modalElement);

                    if (modal)
                        modal.hide();
                }
                else {

                    iziToast.error({
                        title: 'Error',
                        message: 'Failed to add subject'
                    });

                }

            }
            catch (err) {

                console.log(err);

                iziToast.error({
                    title: 'Error',
                    message: 'Failed to add subject'
                });

            }
        }

        async function deleteSubject(id) {

            if (!confirm("Delete this subject?"))
                return;

            try {

                const response = await fetch(
                    `https://localhost:7098/api/admin/del/subject/${id}`,
                    {
                        method: "DELETE"
                    });

                const res = await response.json();

                if (res.success) {

                    iziToast.success({
                        title: 'Success',
                        message: 'Subject deleted successfully'
                    });

                    loadAllSubjects();
                }
                else {

                    iziToast.error({
                        title: 'Error',
                        message: 'Failed to delete subject'
                    });

                }

            }
            catch (err) {

                console.log(err);

                iziToast.error({
                    title: 'Error',
                    message: 'Failed to delete subject'
                });

            }
        }

        loadAllSubjects();

    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/izitoast/1.4.0/js/iziToast.min.js"></script>

</body>
</html>
