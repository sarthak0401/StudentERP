<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/izitoast/1.4.0/css/iziToast.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css'
          rel='stylesheet'>

    <style>
        label {
            min-width: 180px;
        }

        body {
            background-color: #f8f9fa;
        }

        /* Sidebar */
        .sidebar {
            background: white;
            min-height: 100vh;
            border-right: 1px solid #dee2e6;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
        }

        .nav-link {
            color: #495057;
            padding: 12px 20px;
            margin: 4px 10px;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: 500;
        }

            .nav-link:hover {
                background-color: #e9ecef;
                color: #212529;
                transform: translateX(5px);
            }

        .custom-button {
            padding: 3px;
            border: 2px solid black;
            border-radius: 5px;
            width: 100px;
            margin: 15px;
        }

        .active-menu {
            background-color: #0d6efd !important;
            color: white !important;
        }

            .active-menu i {
                color: white !important;
            }

        /* Table */

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        thead {
            background: #f8f9fa;
        }

        th {
            text-align: left;
            padding: 16px;
            color: #495057;
            font-size: 14px;
            font-weight: 600;
        }

        td {
            padding: 16px;
            border-top: 1px solid #dee2e6;
            color: #212529;
        }

        /* FIXED HOVER */

        tbody tr:hover {
            background: #f1f3f5;
            cursor : pointer;
        }

        /* Badge */

        .capacity-badge {
            background: #e7f1ff;
            color: #0d6efd;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
        }

        /* Action Buttons */

        .edit-btn {
            background: #ffc107;
            border: none;
            color: black;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            margin-right: 8px;
        }

        .delete-btn {
            background: #dc3545;
            border: none;
            color: white;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
        }

        .edit-btn:hover {
            background: #e0a800;
        }

        .delete-btn:hover {
            background: #bb2d3b;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-light bg-light border-bottom">
    <div class="container-fluid">
        <a href="../dashboard.html" class="navbar-brand fw-bold">
            🎓 Student ERP
        </a>

        <span>
            Welcome, <strong>Administration</strong>
        </span>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 col-lg-2 sidebar p-0">
            <ul class="nav flex-column mt-3">

                <li class="nav-item">
                    <a href="index.html" class="nav-link ">
                        <i class='bx bxs-dashboard me-2'></i>
                        Dashboard
                    </a>
                </li>

                <li class="nav-item">
                    <a href="AddStudent.html" class="nav-link active-menu">
                        <i class='bx bxs-group me-2'></i>
                        Add Student
                    </a>
                </li>

                <li class="nav-item">
                    <a href="#" class="nav-link">
                        <i class='bx bxs-school me-2'></i>
                        Fee Receipt
                    </a>
                </li>

                <li class="nav-item">
                    <a href="#" class="nav-link">
                        <i class='bx bxs-book-open me-2'></i>
                        Cancel Receipt
                    </a>
                </li>

            </ul>

        </div>

        <div class="col-md-9 col-lg-10 p-4">
            <div class="d-flex justify-content-between">
                <h2 class="mb-4">Add Student</h2>
                <div class="d-flex justify-content-center align-items-center gap-2">
                    <h5 class="m-0">Search Student</h5>
                    <input id="searchStudent" type="text" placeholder="Enter name or mob of student" style="width : 300px; border-radius : 3px">
                    <button class="btn btn-primary"
                            onclick="searchStudentToE()" data-bs-toggle="modal"
                            data-bs-target="#staticBackdrop">

                        <i class="bi bi-search me-2"></i>
                        Search Student
                    </button>
                </div>
            </div>

            <!-- Modal -->
            <div class="modal fade" id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h1 class="modal-title fs-5" id="staticBackdropLabel">Matching Students</h1>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            <table>
                                <thead>
                                    <tr>
                                        <td>Sr.No</td>
                                        <td>Student Name</td>
                                        <!--<td>Student Contact</td>-->
                                    </tr>
                                </thead>

                                <tbody id="modal-student-list-table"></tbody>
                            </table>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        </div>
                    </div>
                </div>
            </div>

            <ul class="nav nav-tabs mt-3" id="myTab" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="personal-info-tab"
                            data-bs-toggle="tab" data-bs-target="#p-info-tab-pane"
                            type="button" role="tab"
                            aria-controls="p-info-tab-pane" aria-selected="true">
                        Personal Information
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="parent-details-tab"
                            data-bs-toggle="tab" data-bs-target="#parent-details-tab-pane"
                            type="button" role="tab"
                            aria-controls="parent-details-tab-pane" aria-selected="false">
                        Parent Details
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="address-tab"
                            data-bs-toggle="tab" data-bs-target="#address-tab-pane"
                            type="button" role="tab"
                            aria-controls="address-tab-pane" aria-selected="false">
                        Address Details
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="acad-details-tab"
                            data-bs-toggle="tab" data-bs-target="#acad-details-tab-pane"
                            type="button" role="tab"
                            aria-controls="acad-details-tab-pane" aria-selected="false">
                        Academic Details
                    </button>
                </li>
            </ul>

            <div class="tab-content" id="myTabContent">
                <div class="tab-pane fade show active" id="p-info-tab-pane" role="tabpanel" aria-labelledby="personal-info-tab" tabindex="0">
                    <div class="card p-4 m-3">
                        <div class="row mb-3">
                            <label for="sname" class="col-sm-2 col-form-label">Student Name</label>

                            <div class="col-sm-10">
                                <input id="sname" type="text" class="form-control">
                            </div>
                        </div>

                        <!--<div class="row mb-3">
                    <label for="sage" class="col-sm-2 col-form-label">Student Age </label>
                    <div class="col-sm-10">
                        <input id="sage" type="number" class="form-control" />
                    </div>
                </div>-->

                        <div class="row mb-3">
                            <label for="sdob" class="col-sm-2 col-form-label">Date of Birth</label>
                            <div class="col-sm-10">
                                <input id="sdob" type="date" class="form-control" />
                            </div>
                        </div>
                        <div class="row mb-3">
                            <label class="col-sm-2 col-form-label">Contact Number</label>
                            <div class="col-sm-10">
                                <div id="contactContainer">

                                    <div class="mb-2 contact-row d-flex gap-2">
                                        <input type="text"
                                               class="form-control contact-number"
                                               placeholder="Enter Contact Number"
                                               maxlength="10">

                                        <button type="button"
                                                class="btn btn-success"
                                                onclick="addContact()">
                                            +
                                        </button>
                                    </div>

                                </div>

                            </div>
                        </div>
                        <div class="row mb-3">
                            <label for="sgender" class="col-sm-2 col-form-label">Gender</label>
                            <div class="col-sm-10">
                                <input id="sgender-m" type="radio" name="sgender" value="Male" />
                                <label for="sgender-m">Male</label>
                                <input id="sgender-f" type="radio" name="sgender" value="Female" />
                                <label for="sgender-f">Female</label>
                                <input id="sgender-o" type="radio" name="sgender" value="Other" />
                                <label for="sgender-o">Other</label>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <label for="sbloodGrp" class="col-sm-2 col-form-label">Blood Group</label>
                            <div class="col-sm-10">
                                <input id="sbloodGrp" type="text" class="form-control" />
                            </div>
                        </div>
                        <div class="row mb-3">
                            <label for="sPhotoUpload" class="col-sm-2 col-form-label">Upload Image</label>
                            <div class="col-sm-10">
                                <input id="sPhotoUpload" type="file" accept="image/*" class="form-control" />
                            </div>
                        </div>

                        <div class="row mb-3 d-none" id="studentImagePreviewContainer">
                            <label class="col-sm-2 col-form-label">Current Image</label>

                            <div class="col-sm-10">
                                <img id="studentImagePreview"
                                     src=""
                                     alt="Student Image"
                                     class="img-thumbnail"
                                     style="width:150px; height:150px; object-fit:cover;" />
                            </div>
                        </div>

                        <div class="row mb-3 d-flex justify-content-end">
                            <button class="custom-button" onclick="switchTab('parent-details-tab')">Next</button>
                        </div>

                    </div>

                </div>
                <div class="tab-pane fade" id="parent-details-tab-pane" role="tabpanel" aria-labelledby="parent-details-tab" tabindex="0">

                    <div class="card p-4 m-3">
                        <div class="row mb-3">
                            <label for="fname" class="col-sm-2 col-form-label">Father Name</label>

                            <div class="col-sm-10">
                                <input id="fname" type="text" class="form-control">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <label for="mname" class="col-sm-2 col-form-label">Mother Name </label>
                            <div class="col-sm-10">
                                <input id="mname" type="text" class="form-control" />
                            </div>
                        </div>

                        <div class="row mb-3">
                            <label for="gcontact1" class="col-sm-2 col-form-label">Contact number</label>
                            <div class="col-sm-10">
                                <input id="gcontact1" type="text" class="form-control"
                                       placeholder="Enter 10 digits phone number"
                                       maxlength="10" />
                            </div>
                        </div>

                        <div class="row mb-3">
                            <label for="gcontact2" class="col-sm-2 col-form-label">Alternate Contact number </label>
                            <div class="col-sm-10">
                                <input id="gcontact2" type="text" class="form-control"
                                       placeholder="Enter 10 digits phone number"
                                       maxlength="10" />
                            </div>
                        </div>

                        <div class="row mb-3 d-flex justify-content-between">
                            <button type="button" class="custom-button" onclick="switchTab('personal-info-tab')">Previous</button>
                            <button class="custom-button" onclick="switchTab('address-tab')">Next</button>
                        </div>
                    </div>
                </div>

                <div class="tab-pane fade" id="address-tab-pane" role="tabpanel" aria-labelledby="address-tab" tabindex="0">
                    <div class="card p-4 m-3">
                        <div class="row mb-3">
                            <label for="address" class="col-sm-2 col-form-label">Address</label>

                            <div class="col-sm-10">
                                <input id="address" type="text" class="form-control">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <label for="city" class="col-sm-2 col-form-label">City</label>
                            <div class="col-sm-10">
                                <input id="city" type="text" class="form-control" />
                            </div>
                        </div>

                        <div class="row mb-3">
                            <label for="state" class="col-sm-2 col-form-label">State</label>
                            <div class="col-sm-10">
                                <input id="state" type="text" class="form-control" />
                            </div>
                        </div>
                        <div class="row mb-3">
                            <label for="pincode" class="col-sm-2 col-form-label">Pincode</label>
                            <div class="col-sm-10">
                                <input id="pincode" type="number" class="form-control" />
                            </div>
                        </div>


                        <div class="row mb-3 d-flex justify-content-between">
                            <button class="custom-button" onclick="switchTab('parent-details-tab')">Previous</button>
                            <button class="custom-button" onclick="switchTab('acad-details-tab')">Next</button>
                        </div>

                    </div>
                </div>

                <div class="tab-pane fade" id="acad-details-tab-pane" role="tabpanel" aria-labelledby="acad-details-tab" tabindex="0">
                    <div class="card p-4 m-3">
                        <div class="row mb-3 align-items-center">

                            <!-- 10th Percentage -->

                            <div class="col-md-2">

                                <label for="10thPerctg"
                                       class="col-form-label">

                                    10th Percentage

                                </label>

                            </div>

                            <div class="col-md-4">

                                <input id="10thPerctg"
                                       type="number"
                                       class="form-control">

                            </div>

                            <!-- 12th Percentage -->

                            <div class="col-md-2">

                                <label for="12thPerctg"
                                       class="col-form-label">

                                    12th Percentage

                                </label>

                            </div>

                            <div class="col-md-4">

                                <input id="12thPerctg"
                                       type="number"
                                       class="form-control">

                            </div>

                        </div>
                        <!--<div class="row mb-3">
                    <label for="12thPerctg" class="col-sm-2 col-form-label">12th Percentage</label>

                    <div class="col-sm-10">
                        <input id="12thPerctg" type="number" class="form-control">
                    </div>
                </div>-->

                        <div class="row mb-3">
                            <label for="jeeRank" class="col-sm-2 col-form-label">JEE All India Rank</label>
                            <div class="col-sm-10">
                                <input id="jeeRank" type="number" class="form-control" />
                            </div>
                        </div>

                        <div class="row mb-3">
                            <label for="schoolName" class="col-sm-2 col-form-label">School / Junior College Name</label>
                            <div class="col-sm-10">
                                <input id="schoolName" type="text" class="form-control" />
                            </div>
                        </div>

                        <div class="row mb-3">
                            <label for="gapYrs" class="col-sm-2 col-form-label">Gap years in Eductation (if any)</label>
                            <div class="col-sm-10">
                                <input id="gapYrs" type="number" class="form-control" />
                            </div>
                        </div>

                        <div class="row mb-3">
                            <label for="gapYrJustification" class="col-sm-2 col-form-label">Justification for Gap years (if gap in education exists)</label>
                            <div class="col-sm-10">
                                <input id="gapYrJustification" type="text" class="form-control" />
                            </div>
                        </div>



                        <div class="row mb-3 d-flex justify-content-between">
                            <button class="custom-button" onclick="switchTab('address-tab')">Previous</button>
                            <button class="custom-button" onclick="SubmitStudentDetails()">Submit</button>
                        </div>

                        <input type="hidden" id="HiddenStudentId" value="" />
                        <input type="hidden" id="existingImage" />
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/izitoast/1.4.0/js/iziToast.min.js"></script>
<script src="../../js/api.js"></script>
<script src="Js/AddStudent.js"></script>

</body>
</html>
