    <script>
    // ── Tab switcher + step indicator sync ───────────────────
    const tabStepMap = {
        'personal-info-tab': 1,
        'parent-details-tab': 2,
        'address-tab': 3,
        'acad-details-tab': 4,
    };

    function switchTab(tabId) {
        const tab = document.getElementById(tabId);
        if (tab) bootstrap.Tab.getOrCreateInstance(tab).show();
    }

    // Listen to Bootstrap tab show events to update step indicator
    document.querySelectorAll('[data-bs-toggle="tab"]').forEach(btn => {
        btn.addEventListener('shown.bs.tab', e => {
            const step = tabStepMap[e.target.id];
            if (step) updateStepIndicator(step);
        });
    });

    function updateStepIndicator(activeStep) {
        for (let i = 1; i <= 4; i++) {
            const circle = document.getElementById(`step-circle-${i}`);
            const label  = document.getElementById(`step-label-${i}`);
            const line   = document.getElementById(`step-line-${i}`);

            circle.classList.remove('active', 'done');
            label.classList.remove('active', 'done');

            if (i < activeStep) {
                circle.classList.add('done');
                circle.innerHTML = '<i class="bi bi-check"></i>';
                label.classList.add('done');
                if (line) line.classList.add('done');
            } else if (i === activeStep) {
                circle.classList.add('active');
                circle.textContent = i;
                label.classList.add('active');
                if (line) line.classList.remove('done');
            } else {
                circle.textContent = i;
                if (line) line.classList.remove('done');
            }
        }
    }

    // ── Add / remove contact rows ─────────────────────────────
    function addContact() {
        const container = document.getElementById('contactContainer');
        const div = document.createElement('div');
        div.className = 'mb-2 contact-row d-flex gap-2';
        div.innerHTML = `
            <input type="text" class="form-control contact-number"
                   placeholder="Enter Contact Number" maxlength="10">
            <button type="button" class="btn btn-danger"
                    onclick="this.parentElement.remove()">−</button>`;
        container.appendChild(div);
    }

    // ── Image preview ─────────────────────────────────────────
    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('studentImagePreview').src = e.target.result;
                document.getElementById('studentImagePreviewContainer').classList.remove('d-none');
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // ── Fee accordion ─────────────────────────────────────────
    function toggleFeeMenu() {
