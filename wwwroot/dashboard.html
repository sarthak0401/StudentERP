<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduCore ERP — Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0b0f1a;
            --surface: #131929;
            --border: #1e2d45;
            --accent: #3b82f6;
            --accent2: #06b6d4;
            --green: #22c55e;
            --amber: #f59e0b;
            --text: #e8edf5;
            --muted: #6b7fa3;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Nav */
        .topnav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 2.5rem;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: .65rem;
            text-decoration: none;
            color: var(--text);
        }

        .brand-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 9px;
            display: grid;
            place-items: center;
            font-size: 1rem;
        }

        .brand-name {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.15rem;
        }

            .brand-name span {
                color: var(--accent);
            }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 1.2rem;
        }

        .nav-greeting {
            font-size: .9rem;
            color: var(--muted);
        }

            .nav-greeting strong {
                color: var(--text);
            }

        .nav-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 50%;
            display: grid;
            place-items: center;
            font-weight: 700;
            font-size: .85rem;
            cursor: pointer;
        }

        .btn-logout {
            padding: .45rem 1rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--muted);
            font-family: 'DM Sans', sans-serif;
            font-size: .85rem;
            cursor: pointer;
            text-decoration: none;
            transition: all .2s;
        }

            .btn-logout:hover {
                border-color: var(--accent);
                color: var(--accent);
            }

        /* Page Body */
        .page-body {

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 2rem;
            background: radial-gradient(ellipse 60% 50% at 30% 40%, rgba(59,130,246,.1) 0%, transparent 55%), radial-gradient(ellipse 50% 40% at 70% 60%, rgba(6,182,212,.07) 0%, transparent 55%);
        }

        .page-header {
            text-align: center;
            margin-bottom: 3.5rem;
            animation: fadeUp .5s ease both;
        }

            .page-header h1 {
                font-family: 'Syne', sans-serif;
                font-size: clamp(1.8rem, 3vw, 2.6rem);
                font-weight: 800;
                letter-spacing: -.03em;
                margin-bottom: .5rem;
            }

            .page-header p {
                color: var(--muted);
                font-size: 1rem;
            }

        /* Panel Cards */
        .panels-grid {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .panel-card {
            width: 300px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            transition: transform .25s, box-shadow .25s, border-color .25s;
            animation: fadeUp .5s ease both;
            position: relative;
            overflow: hidden;
        }

            .panel-card:nth-child(2) {
                animation-delay: .1s;
            }

            .panel-card::before {
                content: '';
                position: absolute;
                inset: 0;
                opacity: 0;
                transition: opacity .3s;
                border-radius: 20px;
            }

            .panel-card.blue::before {
                background: radial-gradient(circle at 50% 0%, rgba(59,130,246,.12), transparent 70%);
            }

            .panel-card.teal::before {
                background: radial-gradient(circle at 50% 0%, rgba(6,182,212,.12), transparent 70%);
            }

            .panel-card:hover {
                transform: translateY(-6px);
                box-shadow: 0 24px 48px rgba(0,0,0,.4);
            }

                .panel-card:hover::before {
                    opacity: 1;
                }

            .panel-card.blue:hover {
                border-color: var(--accent);
            }

            .panel-card.teal:hover {
                border-color: var(--accent2);
            }

        .panel-emoji {
            font-size: 3rem;
            display: block;
        }

        .panel-title {
            font-family: 'Syne', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
        }

        .panel-desc {
            color: var(--muted);
            font-size: .875rem;
            line-height: 1.6;
            margin-bottom: 1.8rem;
        }

        .panel-btn {
            display: inline-block;
            padding: .65rem 1.6rem;
            border-radius: 10px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: .85rem;
            letter-spacing: .04em;
            transition: opacity .2s;
        }

        .panel-card.blue .panel-btn {
            background: var(--accent);
            color: #fff;
        }

        .panel-card.teal .panel-btn {
            background: var(--accent2);
            color: #fff;
        }

        /* Stats */
        .stats-row {
            display: flex;
            gap: 1.5rem;
            margin-top: 3rem;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeUp .5s .25s ease both;
        }

        .stat-pill {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: .6rem 1.4rem;
            display: flex;
            align-items: center;
            gap: .6rem;
            font-size: .85rem;
        }

        .stat-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

            .stat-dot.g {
                background: var(--green);
            }

            .stat-dot.a {
                background: var(--amber);
            }

            .stat-dot.b {
                background: var(--accent);
            }

        .stat-val {
            font-weight: 600;
        }

        .stat-lbl {
            color: var(--muted);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        a .panel-title{
           display : none;
        }

        a:hover .panel-title {
            display: block;
        }
    </style>
</head>
<body>

    <nav class="topnav">
        <a href="dashboard.html" class="brand">
            <div class="brand-icon">🎓</div>
            <div class="brand-name">Edu<span>Core</span> ERP</div>
        </a>
        <div class="nav-right">
            <span class="nav-greeting">Hello, <strong id="loggedUser">Admin</strong></span>
            <div class="nav-avatar">A</div>
            <a href="login.html" class="btn-logout">Sign Out</a>
        </div>
    </nav>

    <main class="page-body">

        <div class="container-fluid">
            <div class="row h-100">
                <div class="col-md-1">
                    <div class="card mb-3 p-lg-3">
                        <a href="Admin/index.html" class="d-flex align-items-center text-decoration-none flex-column">
                            <span class="panel-emoji">🛡️</span>
                            <div class="panel-title fs-6">Admin Section</div>
                        </a>
                    </div>
                    <div class="card mb-3 p-lg-3">
                        <a href="Administration/index.html" class="d-flex align-items-center  text-decoration-none flex-column">
                            <span class="panel-emoji">🏫</span>
                            <div class="panel-title fs-6">Administration Section</div>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!--<div class="stats-row">
            <div class="stat-pill"><div class="stat-dot g"></div><span class="stat-val">24</span><span class="stat-lbl">Classes Active</span></div>
            <div class="stat-pill"><div class="stat-dot b"></div><span class="stat-val">142</span><span class="stat-lbl">Teachers</span></div>
            <div class="stat-pill"><div class="stat-dot a"></div><span class="stat-val">1,840</span><span class="stat-lbl">Students Enrolled</span></div>
        </div>-->
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
