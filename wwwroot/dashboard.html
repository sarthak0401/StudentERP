<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student ERP Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-light bg-light border-bottom">
        <div class="container-fluid">

            <!-- Logo -->
            <a href="dashboard.html"
               class="navbar-brand fw-bold">
                🎓 Student ERP
            </a>

            <div class="d-flex align-items-center gap-3">

                <span>
                    Hello, <strong>Admin</strong>
                </span>

                <a href="index.html"
                   class="btn btn-outline-danger btn-sm">
                    Sign Out
                </a>

            </div>

        </div>
    </nav>

    <!-- Main Content -->
    <div class="container-fluid mt-4">

        <div class="row">

            <!-- Left Panel -->
            <div class="col-md-3">

                <!-- Admin Card -->
                <div class="card mb-3">

                    <div class="card-body text-center">

                        <h1>🛡️</h1>

                        <h5 class="card-title">
                            Admin Section
                        </h5>

                        <p class="card-text">
                            Manage classes, subjects and academic data.
                        </p>

                        <a href="Admin/index.html"
                           class="btn btn-primary">
                            Open
                        </a>

                    </div>

                </div>

                <!-- Administration Card -->
                <div class="card">

                    <div class="card-body text-center">

                        <h1>🏫</h1>

                        <h5 class="card-title">
                            Administration Section
                        </h5>

                        <p class="card-text">
                            Manage school administration activities.
                        </p>

                        <a href="Administration/index.html"
                           class="btn btn-success">
                            Open
                        </a>

                    </div>

                </div>

            </div>

            <!-- Right Panel (Blank for Future Use) -->
            <div class="col-md-9">

                <div class="card h-100">

                    <div class="card-body">

                        <h5 class="text-muted">
                            Dashboard Area
                        </h5>

                        <p class="text-muted">
                            Future reports, widgets, charts and analytics will be displayed here.
                        </p>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
