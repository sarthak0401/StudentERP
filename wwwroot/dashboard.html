<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student ERP Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">


    <style>
        .custom-hover-p {
            display: none;
        }

        a:hover .custom-hover-p{
            display: block;
        }

        .dashboard-container {
            height: calc(100vh - 100px);
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-light bg-light border-bottom">
        <div class="container-fluid">

            <!-- Logo -->
            <a href="dashboard.html"
               class="navbar-brand fw-bold">
                🎓 Student ERP
            </a>

            <div class="d-flex align-items-center gap-3">

                <span>
                    Hello, <strong>Admin</strong>
                </span>

                <a href="index.html"
                   class="btn btn-outline-danger btn-sm">
                    Sign Out
                </a>

            </div>

        </div>
    </nav>

    <!-- Main Content -->
    <div class="container-fluid mt-4">

        <div class="row">

            <!-- Left Panel -->
            <div class="col-md-1">

                <!-- Admin Card -->

                <a href="Admin/index.html" class="text-decoration-none text-dark">

                    <div class="card mb-3">

                        <div class="card-body text-center">

                            <h1>🛡️</h1>

                            <h6 class="card-title" style="font-size:10px">
                                Administration Section
                            </h6>

                            <p class="card-text custom-hover-p" style="font-size:10px">
                                Manage classes, subjects and academic data.
                            </p>

                        </div>

                    </div>

                </a>
                <!-- Administration Card -->

                <a href="Administration/index.html" class="text-decoration-none text-dark">

                    <div class="card">

                        <div class="card-body text-center">

                            <h1>🏫</h1>

                            <h6 class="card-title" style="font-size:10px">
                                Admission Section
                            </h6>

                            <p class="card-text custom-hover-p" style="font-size:10px">
                                Manage school administration activities.
                            </p>
                        </div>

                    </div>
                </a>
            </div>

            <!-- Right Panel (Blank for Future Use) -->
            <div class="col-md-11 dashboard-container">

                <div class="card h-100">

                    <div class="card-body">

                        <h5 class="text-muted">
                            Dashboard Area
                        </h5>

                        <p class="text-muted">
                            Future reports, widgets, charts and analytics will be displayed here.
                        </p>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
